<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f0f11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MoveBox">
  <title>MoveBox</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
  <!-- QR Code generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<!-- ── TOP NAV ─────────────────────────────────────────────────────── -->
<nav class="topnav">
  <div class="nav-logo">
    <span class="nav-dot"></span>
    <span class="nav-title">MoveBox</span>
  </div>
  <div class="nav-right">
    <span class="nav-count" id="box-count-nav">0 boxes</span>
    <div class="drive-indicator" id="drive-nav-indicator" title="Google Drive status"></div>
  </div>
</nav>

<!-- ── SCREENS ─────────────────────────────────────────────────────── -->

<!-- BOXES -->
<section class="screen active" id="screen-home">
  <div class="screen-header">
    <h2>My Boxes</h2>
    <button class="btn btn-primary btn-sm" id="new-box-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>
      New Box
    </button>
  </div>
  <div id="drive-banner"></div>
  <div id="box-list"></div>
  <div class="empty-state" id="box-empty">
    <div class="empty-icon">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" width="52" height="52">
        <rect x="8" y="14" width="32" height="28" rx="3"/>
        <path d="M16 14V10a2 2 0 012-2h12a2 2 0 012 2v4"/>
        <path d="M16 26h16M24 20v12"/>
      </svg>
    </div>
    <p class="empty-title">No boxes yet</p>
    <p class="empty-sub">Tap "New Box" to create your first box and get a printable QR label.</p>
  </div>
</section>

<!-- SCAN -->
<section class="screen" id="screen-scan">
  <div class="screen-header">
    <h2>Scan QR</h2>
  </div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;">
    <div id="scanner-viewport">
      <div class="scanner-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44">
          <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
          <rect x="8" y="8" width="8" height="8" rx="1"/>
        </svg>
        <span>Tap Start to scan a box</span>
      </div>
    </div>
  </div>
  <button class="btn btn-primary btn-full" id="scan-toggle-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/></svg>
    Start Scanner
  </button>
  <div class="divider-label">or enter ID manually</div>
  <div class="row-gap">
    <input type="text" id="manual-scan-id" placeholder="BOX-001-XXXX" style="flex:1;text-transform:uppercase;">
    <button class="btn btn-primary" id="manual-go-btn">Go</button>
  </div>
  <div id="scan-result" class="scan-result-card" style="display:none;"></div>
</section>

<!-- SETTINGS -->
<section class="screen" id="screen-settings">
  <div class="screen-header"><h2>Settings</h2></div>

  <div class="card">
    <div class="card-section-label">Google Drive</div>
    <div id="drive-settings-panel"></div>
  </div>

  <div class="card" style="margin-top:12px;">
    <div class="card-section-label">Move info</div>
    <div class="field">
      <label>Move label</label>
      <input type="text" id="move-name-input" placeholder="e.g. Austin → Denver 2025">
    </div>
    <button class="btn btn-sm btn-primary" id="save-move-btn">Save</button>
  </div>

  <div class="card card-danger" style="margin-top:12px;">
    <div class="card-section-label">Danger zone</div>
    <p class="hint-text" style="margin-bottom:12px;">Permanently delete all local box data.</p>
    <button class="btn btn-danger btn-sm" id="clear-all-btn">Delete all boxes</button>
  </div>
</section>

<!-- ── MODALS ──────────────────────────────────────────────────────── -->

<!-- New Box -->
<div class="sheet-bg" id="new-box-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Box</div>
    <div class="field"><label>Box name</label><input type="text" id="nb-name" placeholder="e.g. Kitchen essentials"></div>
    <div class="field">
      <label>Room</label>
      <select id="nb-room">
        <option value="">— Select room —</option>
        <option>Kitchen</option><option>Living room</option><option>Master bedroom</option>
        <option>Bedroom</option><option>Bathroom</option><option>Office</option>
        <option>Garage</option><option>Basement</option><option>Storage</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Priority</label>
      <div class="seg-control" id="nb-priority">
        <button class="seg active" data-val="normal">Normal</button>
        <button class="seg" data-val="high">Open first</button>
        <button class="seg" data-val="fragile">Fragile</button>
      </div>
    </div>
    <div class="field"><label>Notes (optional)</label><textarea id="nb-notes" rows="2" placeholder="Brief contents description..."></textarea></div>
    <div class="sheet-actions">
      <button class="btn btn-full" id="nb-cancel">Cancel</button>
      <button class="btn btn-primary btn-full" id="nb-create">Create &amp; Get QR</button>
    </div>
  </div>
</div>

<!-- Box Detail -->
<div class="sheet-bg" id="detail-sheet">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- QR Modal -->
<div class="sheet-bg" id="qr-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="qr-sheet-title">QR Code</div>
    <div class="qr-center">
      <div class="qr-card" id="qr-render"></div>
      <p class="qr-sub" id="qr-sub-text"></p>
    </div>
    <div class="sheet-actions" style="flex-direction:column;gap:10px;">
      <button class="btn btn-primary btn-full" id="qr-print-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print Label
      </button>
      <button class="btn btn-full" id="qr-close-btn">Done</button>
    </div>
  </div>
</div>

<!-- AI Identify Toast -->
<div class="ai-toast" id="ai-toast" style="display:none;">
  <div class="ai-toast-inner">
    <div class="ai-spinner"></div>
    <span id="ai-toast-text">Identifying contents…</span>
  </div>
</div>

<!-- Print area (hidden except print) -->
<div id="print-area"></div>

<!-- ── BOTTOM TABS ─────────────────────────────────────────────────── -->
<nav class="bottom-tabs">
  <button class="tab active" data-screen="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Boxes</span>
  </button>
  <button class="tab" data-screen="scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>
    <span>Scan</span>
  </button>
  <button class="tab" data-screen="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</nav>

<script src="js/drive.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>
</body>
</html>
